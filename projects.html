<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects — JorgeSTREAM</title>

    <link rel="stylesheet" href="styles/styles.css" />
  </head>

  <body>
    <!-- NAVBAR (reuse same from main page) -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-logo">Jorge<span>STREAM</span></div>

        <div class="hamburger" onclick="toggleMenu()">
          <span></span><span></span><span></span>
        </div>

        <ul class="nav-menu" id="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="#" class="active">Projects</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="support.html">Technical Support</a></li>
        </ul>
      </div>
    </nav>

    <!-- HEADER -->
    <section class="projects-header">
      <h1>PROJECTS</h1>
      <p>Studio Installations · Networking · Telecommunications</p>
    </section>

    <!-- FILTERS -->
    <div class="filters">
      <button onclick="filterProjects('all')" class="active">All</button>
      <button onclick="filterProjects('studio', event)">Studios</button>
      <button onclick="filterProjects('network')">Networking</button>
      <button onclick="filterProjects('telecom')">Telecom</button>
    </div>

    <!-- GALLERY -->
    <div class="gallery" id="gallery">
      <!-- ITEM -->
      <div
        class="project-card"
        data-category="studio"
        onclick="openLightbox(this)"
      >
        <img src="images/studio1.jpg" />
        <div class="overlay">
          <h3>Radio Studio Build</h3>
          <p>Full broadcast setup</p>
        </div>
      </div>

      <div
        class="project-card"
        data-category="network"
        onclick="openLightbox(this)"
      >
        <img src="images/network1.jpg" />
        <div class="overlay">
          <h3>Enterprise Network</h3>
          <p>Structured cabling + routing</p>
        </div>
      </div>

      <div
        class="project-card"
        data-category="telecom"
        onclick="openLightbox(this)"
      >
        <img src="images/telecom1.jpg" />
        <div class="overlay">
          <h3>Microwave Link</h3>
          <p>Long distance communication</p>
        </div>
      </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
      <!-- PREV -->
      <button class="nav-btn prev" onclick="prevImage(event)">❮</button>

      <!-- MAIN IMAGE -->
      <div class="lightbox-content" onclick="event.stopPropagation()">
        <img id="lightbox-img" />

        <!-- THUMBNAILS -->
        <div class="thumb-strip" id="thumb-strip"></div>
      </div>

      <!-- NEXT -->
      <button class="nav-btn next" onclick="nextImage(event)">❯</button>
    </div>

    <script src="script/project.js"></script>
  </body>
</html>
